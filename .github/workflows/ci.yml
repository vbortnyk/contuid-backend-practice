name: Build and push Conduit backend

on: 
  push:
    branches:
      - main
       
jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # - name: Setup SSH
      #   uses: webfactory/ssh-agent@v0.9.0
      #   with:
      #     ssh-private-key: ${{ secrets.GH_SSH_KEY }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with: 
          registry: ghcr.io
          username: ${{ vars.GH_USERNAME }}
          password: ${{ secrets.GH_PAT }}   
      
      - name: Build and push to GHCR
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ vars.GH_USERNAME }}/${{ vars.BACKEND_IMAGE_NAME }}:${{ github.sha }}
        
          
  deploy:
    needs: build
    uses: vbortnyk/conduit-practice/.github/workflows/deployment-submodule.yml@main
    with:
      service: "backend"
      tag: ${{ github.sha }}
      username: ${{ vars.GH_USERNAME }}
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}
